<div class="register-container">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Regístrate en la Biblioteca Rapsodi</p>

    <form (ngSubmit)="onRegister()">
      
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre" 
          [(ngModel)]="nuevoUsuario.nombre" 
          required 
          placeholder="Ingresa tu nombre">
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="nuevoUsuario.email" 
          required 
          placeholder="ejemplo@ucaldas.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="nuevoUsuario.password" 
          required 
          placeholder="Mínimo 6 caracteres">
      </div>

      <div class="error-box" *ngIf="errorMensaje">
        ⚠️ {{ errorMensaje }}
      </div>

      <div class="success-box" *ngIf="exitoMensaje">
        ✅ {{ exitoMensaje }}
      </div>

      <button type="submit" class="btn-register">Registrarse</button>
    </form>

    <p class="login-link">
      ¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
