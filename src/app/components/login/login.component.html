<div class="login-container">
  <div class="login-card">
    <h2>Biblioteca Rapsodi</h2>
    <p class="subtitle">Inicia sesión para continuar</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="credenciales.email" required placeholder="ejemplo@ucaldas.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="credenciales.password" required placeholder="Ingresa tu contraseña">
      </div>

      <div class="error-box" *ngIf="errorMensaje">
        {{ errorMensaje }}
      </div>

      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <div class="divider">
      <span>ó</span>
    </div>

    <button type="button" class="btn-google" (click)="loginConGoogle()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="google-icon">
      Continuar con Google
    </button>

    <p class="register-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate como usuario nuevo</a>
    </p>
  </div>
</div>
